<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SDG 4.1.1 Leaflet Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""/>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    h2, p {
      margin-left: 16px;
      margin-right: 16px;
    }

    #map {
      width: 95%;
      height: 650px;
      margin: 16px;
      border: 1px solid #999;
    }

    .info {
      padding: 6px 8px;
      font: 14px/16px Arial, Helvetica, sans-serif;
      background: white;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
    }

    .info h4 {
      margin: 0 0 5px;
      color: #777;
    }

    .legend {
      text-align: left;
      line-height: 18px;
      color: #555;
    }

    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <h2>SDG 4.1.1 Choropleth Map</h2>

  <p>
    Indicator shown: female lower secondary reading percentage. Hover over a country to see its value.
  </p>

  <div id="map"></div>

  <script type="text/javascript" src="mySDGdata.js"></script>

  <script type="text/javascript">
    const map = L.map('map').setView([20, 0], 2);

    const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    const info = L.control();

    info.onAdd = function () {
      this._div = L.DomUtil.create('div', 'info');
      this.update();
      return this._div;
    };

    info.update = function (props) {
      const contents = props
        ? `<b>${props.country_name}</b><br />Reading: ${props.reading_pct ?? 'No data'}${props.reading_year ? ' (' + props.reading_year + ')' : ''}`
        : 'Hover over a country';

      this._div.innerHTML = `<h4>SDG 4.1.1</h4>${contents}`;
    };

    info.addTo(map);

    function getColor(d) {
      return d == null ? '#d9d9d9' :
             d > 80  ? '#005a32' :
             d > 60  ? '#238b45' :
             d > 40  ? '#41ab5d' :
             d > 20  ? '#74c476' :
             d > 0   ? '#c7e9c0' :
                        '#f7fcf5';
    }

    function style(feature) {
      return {
        weight: 1,
        opacity: 1,
        color: 'white',
        dashArray: '3',
        fillOpacity: 0.7,
        fillColor: getColor(feature.properties.reading_pct)
      };
    }

    function highlightFeature(e) {
      const layer = e.target;

      layer.setStyle({
        weight: 3,
        color: '#666',
        dashArray: '',
        fillOpacity: 0.7
      });

      layer.bringToFront();
      info.update(layer.feature.properties);
    }

    let geojson;

    function resetHighlight(e) {
      geojson.resetStyle(e.target);
      info.update();
    }

    function zoomToFeature(e) {
      map.fitBounds(e.target.getBounds());
    }

    function onEachFeature(feature, layer) {
      layer.on({
        mouseover: highlightFeature,
        mouseout: resetHighlight,
        click: zoomToFeature
      });
    }

    geojson = L.geoJson(nationData, {
      style: style,
      onEachFeature: onEachFeature
    }).addTo(map);

    const legend = L.control({position: 'bottomright'});

    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'info legend');
      const grades = [0, 20, 40, 60, 80];
      const labels = [];
      let from, to;

      for (let i = 0; i < grades.length; i++) {
        from = grades[i];
        to = grades[i + 1];

        labels.push(
          `<i style="background:${getColor(from + 1)}"></i> ${from}${to ? '&ndash;' + to : '+'}`
        );
      }

      labels.push(`<i style="background:#d9d9d9"></i> No data`);
      div.innerHTML = labels.join('<br>');
      return div;
    };

    legend.addTo(map);
  </script>

</body>
</html>
